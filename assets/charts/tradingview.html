<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TradingView Chart</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #chart { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    let chart = null;
    let candlestickSeries = null;
    let volumeSeries = null;

    function createChart(options = {}) {
      const container = document.getElementById('chart');
      if (chart) { chart.remove(); chart = null; }

      const chartOptions = {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
          background: { type: 'solid', color: '#ffffff' },
          textColor: '#1A1D26',
          fontSize: 12,
        },
        grid: {
          vertLines: { color: '#f1f5f9' },
          horzLines: { color: '#f1f5f9' },
        },
        crosshair: { mode: 0 },
        rightPriceScale: { borderColor: '#e8ecf1' },
        timeScale: {
          borderColor: '#e8ecf1',
          timeVisible: true,
          secondsVisible: false,
        },
      };

      chart = LightweightCharts.createChart(container, chartOptions);

      // Candlestick series
      candlestickSeries = chart.addCandlestickSeries({
        upColor: '#22c55e',
        downColor: '#ef4444',
        borderUpColor: '#22c55e',
        borderDownColor: '#ef4444',
        wickUpColor: '#22c55e',
        wickDownColor: '#ef4444',
      });

      // Volume series
      volumeSeries = chart.addHistogramSeries({
        color: '#26a69a',
        priceFormat: { type: 'volume' },
        priceScaleId: '',
      });

      chart.priceScale('').applyOptions({
        scaleMargins: { top: 0.8, bottom: 0 },
      });

      // Resize handler
      window.addEventListener('resize', () => {
        if (chart) {
          chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        }
      });

      return chart;
    }

    function setData(candleData, volumeData) {
      if (!candlestickSeries || !volumeSeries) return;
      candlestickSeries.setData(candleData || []);
      volumeSeries.setData(volumeData || []);
      if (chart) chart.timeScale().fitContent();
    }

    function addSMA(data, color = '#2962FF') {
      if (!chart) return;
      const lineSeries = chart.addLineSeries({ color, lineWidth: 2 });
      lineSeries.setData(data);
      return lineSeries;
    }

    // Listen for messages from Flutter
    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg.type === 'create') {
        createChart(msg.options || {});
      } else if (msg.type === 'setData') {
        setData(msg.candles, msg.volumes);
      } else if (msg.type === 'addSMA') {
        addSMA(msg.data, msg.color);
      } else if (msg.type === 'fitContent') {
        if (chart) chart.timeScale().fitContent();
      }
    });

    // Auto-create chart on load
    createChart();
  </script>
</body>
</html>
