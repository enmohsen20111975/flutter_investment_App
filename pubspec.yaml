name: investment_assistant
description: مساعد الاستثمار - Investment Assistant Mobile App
version: 2.6.3+37

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0

  # Network
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.0

  # Auth
  google_sign_in: ^6.1.0
  sqflite: ^2.2.8+4
  path_provider: ^2.0.17
  path: ^1.8.3

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  confetti: ^0.7.0
  flutter_staggered_animations: ^1.1.0
  animated_text_kit: ^4.2.2
  flutter_bounce: ^1.1.0
  animated_bottom_navigation_bar: ^1.3.3

  # Charts
  fl_chart: ^0.68.0
  webview_flutter: ^4.7.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.0
  connectivity_plus: ^7.1.1
  # Version checking
  package_info_plus: ^8.0.0
  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  # Theme management
  flutter_switch: ^0.3.2
  provider: ^6.1.5+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/charts/
    - assets/image/
    - assets/db/

flutter_native_splash:
  color: "#FFFFFF"
  background_image: "assets/image/m2y.jpg"
  android_12:
    image: "assets/image/m2y.jpg"
    color: "#FFFFFF"
  android: true
  ios: true
  web: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/icone.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/image/icone.jpg"